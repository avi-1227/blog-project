{% load crispy_forms_tags %}
<h2>Add a new comment</h2>
<form action="{% url 'blogapp:post_comment' post.id %}" method="post">
    {{ form|crispy }}
    {% csrf_token %}
    <div style="margin-top: 20px;">
        <input class="btn btn-secondary" type="submit" value="Add comment">
    </div>

</form>
