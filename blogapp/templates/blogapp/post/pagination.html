<div class="blog-pagination">
    <ul class="justify-content-center">
        {% if page.has_previous %}
        <li class="border border-warning">
            
            <a href="?page={{page.previous_page_number}}">&laquo;</a>
            
        </li>
        {% endif %}

        <li class="border border-warning active"><a href="#">{{page.number}}</a></li>

        {% if page.has_next %}
        <li class="border border-warning"><a href="?page={{page.next_page_number}}"> &raquo; </a></li>
        {% endif %}
    </ul>
</div><!-- End blog pagination -->
